# Example go2rtc Configuration File
# Copy this file to your go2rtc server directory or use it to configure your local go2rtc instance.

api:
  listen: "0.0.0.0:1984"

rtsp:
  listen: "0.0.0.0:8554"

webrtc:
  listen: "0.0.0.0:8555"

streams:
  # The stream keys below should match the "stream_key" defined in the Laravel CCTV manager.
  # Format:
  # <stream_key>: <rtsp_url_or_other_source>
  # 
  # Example:
  # cam_lobby: rtsp://admin:admin_pass_123@192.168.1.101:554/h264Preview_01_main
  # cam_parking: rtsp://admin:admin_pass_123@192.168.1.102:554/h264Preview_01_main
